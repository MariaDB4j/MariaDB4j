name: Java Maven Test CI (Linux + Windows + macOS)

on:
  push:
    branches: [main]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel any in-progress job or run if there is a newer commit
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  testOnLinux:
    name: Maven Verify (Build & Test) on Linux
    runs-on: ubuntu-24.04
    permissions:
      # maven-dependency-submission-action needs write
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # https://github.com/marketplace/actions/cache-apt-packages
      - uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # latest
        with:
          packages: mariadb-server
          version: 1.0
      # https://github.com/marketplace/actions/setup-java-jdk
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version-file: .java-version
          cache: maven
      # Build the new Windows 11.8.6 DB package (includes mysqladmin.exe for graceful shutdown)
      # so it is available in the local Maven cache for the tests below.
      - name: Build Windows MariaDB 11.8.6 DB package
        run: ./mvnw --batch-mode -f DBs/mariaDB4j-db-11.8.6/mariaDB4j-db-winx64-11.8.6/pom.xml clean install
      # Run verify, not just package, to catch any failures of mariaDB4j-maven-plugin's integration test
      - run: ./mvnw --show-version --batch-mode --strict-checksums verify
      # When contrib. new DB version, then ./mvnw -f DBs/pom.xml clean install

      # https://github.com/marketplace/actions/maven-dependency-tree-dependency-submission
      - name: Maven Dependency Tree Dependency Submission
        if: ${{ github.event_name == 'push' }}
        uses: advanced-security/maven-dependency-submission-action@b275d12641ac2d2108b2cbb7598b154ad2f2cee8 # v5.0.0

  testOnWindows:
    runs-on: windows-2025
    name: Maven Verify (Build & Test) on Windows
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: adopt
          java-version-file: .java-version
          cache: maven
      - uses: ankane/setup-mariadb@6caf5fe71e6d7165cd21ca2dcfe5b1d023286795 # v1 as of 2026-03-30, required for 11.8 support
        with:
          mariadb-version: "11.8"
      # Build the new Windows 11.8.6 DB package (includes mysqladmin.exe for graceful shutdown)
      # so it is available in the local Maven cache for the tests below.
      - name: Build Windows MariaDB 11.8.6 DB package
        run: ./mvnw.cmd --batch-mode -f DBs/mariaDB4j-db-11.8.6/mariaDB4j-db-winx64-11.8.6/pom.xml clean install
      - name: Build with Maven
        run: ./mvnw.cmd --show-version --batch-mode --strict-checksums verify

  testOnMac:
    runs-on: macos-15
    name: Maven Verify (Build & Test) on macOS
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: adopt
          java-version-file: .java-version
          cache: maven
      # Build the new Windows 11.8.6 DB package (includes mysqladmin.exe for graceful shutdown)
      # so it is available in the local Maven cache for the simulated-platform tests below.
      - name: Build Windows MariaDB 11.8.6 DB package
        run: ./mvnw --batch-mode -f DBs/mariaDB4j-db-11.8.6/mariaDB4j-db-winx64-11.8.6/pom.xml clean install
      - name: Build with Maven
        run: ./mvnw --show-version --batch-mode --strict-checksums verify
